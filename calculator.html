<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Crypto Portfolio Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0a0e17 0%, #1a2338 100%); color: #e0e7ff; }
        .card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(59, 130, 246, 0.2); }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-lg p-10 rounded-3xl">
        <h1 class="text-3xl font-bold text-center mb-8">Investment Calculator</h1>

        <form method="POST" class="space-y-8">
            <div>
                <label class="block text-slate-300 mb-3">Total Amount (₹)</label>
                <input type="number" name="amount" step="0.01" required
                       class="w-full px-6 py-5 bg-slate-800 border border-slate-600 rounded-2xl text-xl">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-slate-300 mb-3">Coin</label>
                    <select name="coin" class="w-full px-6 py-5 bg-slate-800 border border-slate-600 rounded-2xl">
                        <option value="BTC">Bitcoin (BTC)</option>
                        <option value="ETH">Ethereum (ETH)</option>
                        <option value="SOL">Solana (SOL)</option>
                        <option value="BNB">BNB</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-300 mb-3">Allocation (%)</label>
                    <input type="number" name="allocation" value="100" min="0" max="100" required
                           class="w-full px-6 py-5 bg-slate-800 border border-slate-600 rounded-2xl">
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-5 rounded-2xl text-lg font-semibold">
                Calculate
            </button>
        </form>

        {% if result is not none %}
        <div class="mt-10 p-8 bg-slate-900 rounded-3xl text-center border border-blue-500/30">
            <p class="text-slate-400">Investment Amount</p>
            <p class="text-5xl font-bold text-green-400 mt-3">₹ {{ result }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
