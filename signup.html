<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Crypto Portfolio Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a2338 100%);
            color: #e0e7ff;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .card {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .btn-primary {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md p-10 rounded-3xl">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-bold">Create Account</h2>
            <p class="text-slate-400 mt-2">Join the smartest crypto community</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <input type="text" name="username" required
                       class="w-full px-5 py-4 bg-slate-800 border border-slate-600 rounded-2xl focus:outline-none focus:border-blue-500 text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <input type="email" name="email" required
                       class="w-full px-5 py-4 bg-slate-800 border border-slate-600 rounded-2xl focus:outline-none focus:border-blue-500 text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-5 py-4 bg-slate-800 border border-slate-600 rounded-2xl focus:outline-none focus:border-blue-500 text-white">
            </div>

            <button type="submit" 
                    class="btn-primary w-full py-4 rounded-2xl text-lg font-semibold text-white">
                Create Account
            </button>
        </form>

        <p class="text-center text-slate-400 mt-8">
            Already have an account? 
            <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium">Login</a>
        </p>
    </div>
</body>
</html>
