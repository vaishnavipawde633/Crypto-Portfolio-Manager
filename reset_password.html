<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Crypto Portfolio Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0a0e17 0%, #1a2338 100%); color: #e0e7ff; }
        .card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(59, 130, 246, 0.2); }
        .btn-primary { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="card w-full max-w-md p-10 rounded-3xl">
        <h2 class="text-3xl font-bold text-center mb-8">Reset Password</h2>
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">New Password</label>
                <input type="password" name="password" required
                       class="w-full px-5 py-4 bg-slate-800 border border-slate-600 rounded-2xl focus:border-blue-500 text-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Confirm Password</label>
                <input type="password" name="confirm_password" required
                       class="w-full px-5 py-4 bg-slate-800 border border-slate-600 rounded-2xl focus:border-blue-500 text-white">
            </div>
            <button type="submit" class="btn-primary w-full py-4 rounded-2xl text-lg font-semibold">
                Reset Password
            </button>
        </form>
    </div>
</body>
</html>
